# Proyecto Pizzeria / Restogestion — stack producción (VPS)
#
# Base de datos: PostgreSQL (requerido por el backend Spring Boot; no MySQL).
#
# Redes:
#   - resto-network: red interna entre db, backend y frontend
#   - proxy_default: red compartida con Nginx Proxy Manager (TLS en NPM, no en estos contenedores)
#
# Tráfico público: HTTPS vía NPM (restogestion.com.ar → frontend, api.restogestion.com.ar → backend).
# Los servicios backend y frontend NO publican puertos en el host; NPM los alcanza por nombre
# de contenedor en proxy_default (p. ej. restogestion-frontend:80, restogestion-backend:8080).
#
# Antes de levantar: .env en la raíz (ver comentarios al final) o exportar variables.
#
# Memoria (límites por contenedor; requiere Docker Compose v2 / motor reciente):
#   Total aproximado del stack: ~832 MiB (64 + 256 + 512). Ajusta si tu VPS es muy justo.
#   512 MiB para TODO el proyecto (db+jvm+nginx) no es viable en producción: Postgres y JVM
#   compiten; mínimo razonable suele ser ~1–1.5 GiB para el stack completo.

services:
  db:
    image: postgres:16-alpine
    container_name: restogestion-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restogestion}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
    volumes:
      - restogestion_pgdata:/var/lib/postgresql/data
    networks:
      - resto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-restogestion}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restogestion-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-restogestion}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Definir JWT_SECRET_KEY en .env (Base64, ver docs)}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Origen del SPA (HTTPS); varios orígenes separados por coma si usas www o varios subdominios
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://restogestion.com.ar}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=25.0"
    networks:
      - resto-network
      - proxy_default
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.restogestion.com.ar/api}
    container_name: restogestion-frontend
    restart: unless-stopped
    networks:
      - resto-network
      - proxy_default
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

networks:
  resto-network:
    driver: bridge
  proxy_default:
    external: true

volumes:
  restogestion_pgdata:

# --- Variables recomendadas en .env (raíz del repo) ---
# POSTGRES_DB=restogestion
# POSTGRES_USER=postgres
# POSTGRES_PASSWORD=un_secreto_largo
# JWT_SECRET_KEY=<cadena Base64 compatible con HMAC en JwtService>
# APP_CORS_ORIGINS=https://restogestion.com.ar
# VITE_API_BASE_URL=https://api.restogestion.com.ar/api
#
# Build / arranque:
#   docker compose build --no-cache
#   docker compose up -d
#
# Nota: perfil prod usa ddl-auto: validate; el esquema debe existir (migraciones o primer arranque con cuidado).
